# Tiny Tapeout project information
project:
  title:        "4x4 Systolic Array Matrix Multiplier"
  author:       "Ross"
  discord:      ""
  description:  "4x4 systolic array with Wallace tree multipliers computing 4x4 matrix multiply with 2-bit elements"
  language:     "Verilog"
  clock_hz:     0

  tiles: "1x1"

  top_module:  "tt_um_ross_systolic"

  source_files:
    - "project.v"
    - "systolic_4x4.v"
    - "systolic_pe.v"
    - "wallace_mult_2x2.v"

pinout:
  ui[0]: "data_byte_bit0"
  ui[1]: "data_byte_bit1"
  ui[2]: "data_byte_bit2"
  ui[3]: "data_byte_bit3"
  ui[4]: "data_byte_bit4"
  ui[5]: "data_byte_bit5"
  ui[6]: "data_byte_bit6"
  ui[7]: "data_byte_bit7"

  uo[0]: "result_data_bit0"
  uo[1]: "result_data_bit1"
  uo[2]: "result_data_bit2"
  uo[3]: "result_data_bit3"
  uo[4]: "result_data_bit4"
  uo[5]: "result_data_bit5"
  uo[6]: "valid"
  uo[7]: "busy"

  uio[0]: "wren"
  uio[1]: "start"
  uio[2]: "debug"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

